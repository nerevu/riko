[tox]
# Modern tox (>=4) driven by uv via tox-uv, mirroring the CI matrix:
#   py3xx           -> base install (offline; async tests self-skip)
#   py3xx-optional  -> every extra installed (async tests run)
env_list =
    py{312,313,314}{,-optional}
    lint
requires =
    tox>=4.22
    tox-uv>=1.13

[testenv]
description = run the test suite ({env_name})
runner = uv-venv-lock-runner
dependency_groups = dev
extras =
    optional: perf
    optional: async
    optional: finance
set_env =
    PYTHONHASHSEED = 94967295
    PYTHONWARNINGS = all
commands =
    pytest {posargs}

[testenv:lint]
description = run ruff lint and format checks
runner = uv-venv-lock-runner
skip_install = true
dependency_groups = dev
commands =
    ruff check {posargs:.}
    ruff format --check {posargs:.}
