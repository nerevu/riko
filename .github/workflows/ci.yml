name: CI

on:
  push:
    branches-ignore:
      - "v[0-9]+*"
  pull_request:

env:
  PYTHONHASHSEED: "94967295"

jobs:
  test:
    # Ported from the old .travis.yml matrix: {python} x {optional}.
    # `optional=true` installs every extra (perf/async/finance), which brings
    # in Twisted so the async tests run instead of self-skipping.
    name: py${{ matrix.python-version }} (optional=${{ matrix.optional }})
    runs-on: ubuntu-latest
    continue-on-error: ${{ matrix.experimental == true }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13", "3.14"]
        optional: [true, false]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Reject unconditional skips
        run: |
          if grep -rn "@pytest.mark.skip$" tests; then
            echo "Unconditional pytest skips are not permitted."
            exit 1
          fi

      - name: Install (optional=${{ matrix.optional }})
        run: |
          if [ "${{ matrix.optional }}" = "true" ]; then
            uv sync --group dev --all-extras
          else
            uv sync --group dev
          fi

      - name: Lint
        run: uv run manage lint

      - name: Test
        run: uv run manage test
