name: CI

on:
  push:
    branches-ignore:
      - "v[0-9]+*"
  pull_request:
    branches: [ main ]

env:
  PYTHONHASHSEED: "94967295"

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sort imports
        run: uvx ruff check --select I --fix

      - name: Fix style issues
        run: uvx ruff check --fix

      - name: Format
        run: uvx ruff format

  test:
    name: py${{ matrix.python-version }} (optional=${{ matrix.optional }})
    runs-on: ubuntu-latest
    continue-on-error: ${{ matrix.experimental == true }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13", "3.14"]
        optional: [true, false]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true

      - name: Reject unconditional skips
        run: |
          if grep -rn "@pytest.mark.skip$" tests; then
            echo "Unconditional pytest skips are not permitted."
            exit 1
          fi

      - name: Install (optional=${{ matrix.optional }})
        run: |
          if [ "${{ matrix.optional }}" = "true" ]; then
            uv sync --group dev --all-extras
          else
            uv sync --group dev
          fi

      - name: Lint
        run: uv run manage lint

      - name: Test
        run: uv run manage test
